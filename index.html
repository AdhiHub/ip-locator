<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Locator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌐 IP Locator</h1>
      <p>Look up any IP address</p>
    </header>

    <div class="input-group">
      <input type="text" id="ipInput" placeholder="Enter IP address (or leave blank for yours)...">
      <button class="btn" id="lookupBtn">Lookup</button>
    </div>

    <div id="result" class="result-box">Enter an IP and click Lookup</div>

    <footer>
      <p>Powered by <a href="https://ip-api.com">ip-api.com</a></p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
